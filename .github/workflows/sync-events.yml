name: Sync public Luma events

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

jobs:
  sync-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and normalize public events
        run: node scripts/sync-events.mjs

      - name: Commit refreshed event data
        run: |
          git config user.name "budgetgurugram-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/events.json
          git diff --cached --quiet || git commit -m "chore: refresh public event listings"
          git push
